# Dependabot configuration — https://docs.github.com/code-security/dependabot
# Ecosystems: root Cargo workspace (core + cli), the separate src-tauri Cargo
# workspace, the pnpm frontend, and GitHub Actions. Minor/patch bumps are
# grouped into one PR per ecosystem to cut noise; majors stay separate for review.
version: 2

updates:
  # --- Rust: root workspace (slideflow-core, slideflow-cli) ---
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
    groups:
      # candle-core / candle-nn / candle-transformers MUST move in lockstep —
      # a mismatched pair breaks the `embeddings` feature (VarBuilder type skew).
      # Group them (majors included) so they always arrive as one reviewable PR.
      # Listed before cargo-minor-patch so candle-* land here regardless of type.
      candle:
        patterns:
          - "candle-*"
        update-types:
          - major
          - minor
          - patch
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # --- Rust: Tauri host (separate [workspace], excluded from root) ---
  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
      - tauri
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Same lockstep rule as the root workspace: candle reaches src-tauri
      # transitively via slideflow-core's embeddings feature, so keep the family
      # batched here too if Dependabot ever proposes them for this lockfile.
      candle:
        patterns:
          - "candle-*"
        update-types:
          - major
          - minor
          - patch
      tauri-minor-patch:
        update-types:
          - minor
          - patch

  # --- Frontend: pnpm workspace (apps/desktop) ---
  - package-ecosystem: npm
    directory: /apps/desktop
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # --- CI: GitHub Actions used by ci.yml / release.yml ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        update-types:
          - minor
          - patch
