# CI for Slideflow.
#
# Two things are tested on every push / PR:
#   * the pure-Rust workspace: the engine crate `slideflow-core` plus the
#     `slideflow-cli` companion binary (no GTK/WebKit needed — the Tauri shell at
#     apps/desktop/src-tauri is a *separate* Cargo workspace and is deliberately
#     excluded from the root workspace, so this runs on plain Linux/macOS/Windows
#     runners). The CLI is also release-built to catch profile-only breakage.
#   * the React/TS frontend under apps/desktop (type-check + production build).
#
# `clippy` runs but is intentionally NON-BLOCKING (continue-on-error) — see the
# comment on that job. `cargo fmt --check` is not gated at all: the crate does
# not currently pass it, so adding it would make CI red on unrelated code.
name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Engine crate + CLI: build + run all tests (lib, integration, examples).
  core:
    name: core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `slideflow-cli` is a thin wrapper over the engine, so its debug tests add
      # negligible time (core is already compiled here) while giving real
      # cross-platform coverage of the CLI's spawn/paths/output on all three OSes.
      - name: cargo test
        run: cargo test -p slideflow-core -p slideflow-cli --all-targets
      # Release build of the CLI binary: catches profile-only breakage (LTO/strip)
      # and proves the shippable `slideflow` binary links on every platform.
      - name: build CLI (release)
        run: cargo build -p slideflow-cli --release
      # Non-blocking: verify the optional candle-backed E5 embedder still
      # compiles. Ubuntu-only + continue-on-error to keep it cheap — the default
      # engine build above is what actually gates CI. The `embeddings` feature
      # pulls candle/tokenizers, which the default build never touches.
      - name: cargo check (embeddings feature)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: cargo check -p slideflow-core --features embeddings

  # Frontend: install deps + `pnpm build` (= tsc --noEmit && vite build).
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # pnpm must be set up BEFORE setup-node: setup-node's `cache: pnpm` step
      # shells out to `pnpm store path`, which fails if pnpm isn't installed yet.
      # Pin to an exact patch, not a floating `11`: pnpm 11.12.0's self-installer
      # crashes ("Cannot use 'in' operator to search for 'integrity' in undefined")
      # so `version: 11` resolving to latest-11.x broke this job. 11.7.0 is the
      # last known-good release; bump deliberately once upstream is fixed.
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      # Node 22 (latest 22.x, ≥ 22.6) is required: the tray-model test step below
      # runs TypeScript directly via `node --experimental-strip-types`.
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      # NB: the pnpm 11 supply-chain cooldown (minimumReleaseAge) would reject
      # this frozen install whenever the lockfile pins a < 1-day-old browserslist
      # data package; the exemptions in apps/desktop/pnpm-workspace.yaml handle it.
      - name: Install dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: apps/desktop
        run: pnpm build
      # Pure-logic tray-model tests (multi-tray migration, per-tray undo
      # isolation, delete-active behaviour). No JS test framework is wired in
      # this app; the file is plain assertions run straight by Node's
      # type-stripping (requires Node ≥ 22.6).
      - name: Tray model tests
        working-directory: apps/desktop
        run: pnpm test:tray

  # Tauri host (apps/desktop/src-tauri) is a SEPARATE Cargo workspace that the
  # `core` job never compiles. Type-check it so Dependabot bumps to its own deps
  # — and transitive bumps that reach it via slideflow-core's `embeddings`
  # feature (candle et al.) — are actually gated. Without this a broken host
  # only surfaces at release time (release.yml on a v* tag). BLOCKING on purpose.
  src-tauri:
    name: src-tauri (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # GTK/WebKit + friends, mirroring release.yml's Linux Tauri build deps.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            build-essential
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      # tauri-build reads `frontendDist` (../dist, gitignored). A `cargo check`
      # doesn't embed assets, but the dir must exist — a placeholder keeps this
      # job decoupled from the frontend build (the point is the Rust host).
      - name: Placeholder frontend dist
        run: mkdir -p apps/desktop/dist && echo '<!doctype html>' > apps/desktop/dist/index.html
      # The desktop crate pulls slideflow-core with `features = ["embeddings"]`,
      # so this compiles candle too — no extra feature flag needed.
      - name: cargo check (src-tauri host)
        working-directory: apps/desktop/src-tauri
        run: cargo check --all-targets

  # Lint. NON-BLOCKING (continue-on-error): slideflow-core currently trips a
  # handful of clippy lints (e.g. while_let_loop, enum_variant_names) that must
  # be fixed inside crates/ in a dedicated PR. Until then this job reports lint
  # status without failing the pipeline. Flip `continue-on-error` to false once
  # the crate is clean.
  clippy:
    name: clippy (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy -p slideflow-core --all-targets -- -D warnings
