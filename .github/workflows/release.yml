# Release builds for Slideflow.
#
# Produces installable bundles for every desktop target and (on a tag push)
# attaches them to a DRAFT GitHub release:
#   * macOS  — .dmg for Apple Silicon (aarch64) and Intel (x86_64)
#   * Linux  — .deb, .AppImage and .rpm (built on ubuntu-22.04)
#   * Windows — .msi (WiX) and .exe (NSIS)
#
# Triggers:
#   * push of a tag matching `v*`  -> build + create/populate a draft release
#   * workflow_dispatch (manual)   -> build only, NO release is created
#     (tagName is left empty on non-tag runs, and tauri-action then just builds
#      the app without uploading assets — handy for verifying the build).
#
# Bundle targets are chosen per-OS via the tauri CLI `--bundles` flag passed
# through tauri-action's `args`, rather than editing tauri.conf.json (whose
# `bundle.targets` is ["app","dmg"], i.e. macOS-only).
#
# NOTE ON SIGNING:
#   * macOS — Developer ID signing + notarization ARE wired up below via the
#     APPLE_* env vars on the tauri-action step. They read from repo secrets;
#     until all six secrets exist the macOS build falls back to UNSIGNED (which
#     produces the "Slideflow is damaged" Gatekeeper error on download). See
#     docs/RELEASE_SIGNING.md for how to create the Developer ID cert and add
#     the secrets. The APPLE_* vars are inert on the Linux/Windows runners.
#   * Windows — Authenticode signing via Azure Artifact Signing (formerly
#     "Trusted Signing") IS wired up below. It reads six AZURE_* repo secrets;
#     until they exist the Windows build falls back to UNSIGNED (SmartScreen
#     "unknown publisher" warning). There is no Windows equivalent of Apple
#     notarization — a valid signature stops the "unknown publisher" wording,
#     but SmartScreen still warns until the download builds reputation. See
#     docs/WINDOWS_SIGNING.md for how to create the Azure resources and add the
#     secrets. The AZURE_* vars are inert on the macOS/Linux runners.
#   * Updater — update packages are minisign-signed with
#     TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD (repo
#     secrets, independent of Apple signing); the matching pubkey lives in
#     tauri.conf.json. tauri-action also generates/merges the latest.json
#     manifest the in-app updater polls. See docs/RELEASE_SIGNING.md.
#
# NOTE ON ACTION VERSION: tauri-apps/tauri-action is pinned to @v1, the current
# major (latest release action-v1.0.0). It supersedes the older @v0 (0.6.x)
# line; all current Tauri 2 docs use @v1.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: build (${{ matrix.platform }} ${{ matrix.arch }})
    # Required so tauri-action can create the draft release and upload assets.
    permissions:
      contents: write
    # Windows Authenticode signing (Azure Artifact Signing). trusted-signing-cli
    # reads the three AZURE credentials from the environment; the endpoint /
    # account / profile become the signCommand injected below. All inert unless
    # the secrets are set, and unused on the macOS/Linux jobs. Job-level so the
    # "Set up Windows signing" step's `if:` can gate on env.AZURE_CLIENT_ID.
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
      AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
      AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # `app` must stay in the macOS bundle list: the updater artifact
          # (.app.tar.gz + .sig) is only produced for *requested* bundle
          # targets, and dmg alone does not count — without it, latest.json
          # silently ships without the darwin keys.
          # `cli_target` is the triple the bundled `slideflow` CLI sidecar is
          # built for (embed-cli.mjs reads it as SLIDEFLOW_CLI_TARGET). It must
          # match the `--target` the app bundles for, so the macOS cross-builds
          # set it explicitly; Linux/Windows build for the host, so it's empty.
          - platform: macos-latest
            arch: aarch64
            args: '--target aarch64-apple-darwin --bundles app,dmg'
            cli_target: aarch64-apple-darwin
          - platform: macos-latest
            arch: x86_64
            args: '--target x86_64-apple-darwin --bundles app,dmg'
            cli_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            arch: x86_64
            args: '--bundles deb,appimage,rpm'
            cli_target: ''
          - platform: windows-latest
            arch: x86_64
            args: '--bundles msi,nsis'
            cli_target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # The macOS runner is Apple Silicon; the x86_64 build needs the Intel
          # target added. Installed on macOS only to keep Linux/Windows lean.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # The Tauri host crate lives in its own workspace under src-tauri.
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # NOTE: do NOT add the legacy libappindicator3-dev here — it now
          # conflicts with libayatana-appindicator3-dev on ubuntu-22.04
          # (apt exit 100, "unmet dependencies"), which is what broke the
          # v0.2.3 and first v0.3.0 release runs. Tauri 2 needs only ayatana.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      # pnpm before setup-node so setup-node's pnpm cache can find pnpm.
      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      # Windows only, and only when the Azure secrets are present. Installs the
      # signer and writes a tiny config overlay that sets bundle.windows.signCommand.
      # tauri-action merges it via `--config` (appended to args below). Leaving
      # tauri.conf.json itself free of signCommand keeps local/unsigned builds
      # working — without this overlay the Windows build is simply unsigned.
      - name: Set up Windows signing (Azure Artifact Signing)
        id: winsign
        if: matrix.platform == 'windows-latest' && env.AZURE_CLIENT_ID != ''
        shell: pwsh
        run: |
          cargo install trusted-signing-cli --locked
          # Resolve endpoint/account/profile now; keep %1 literal — Tauri
          # substitutes it with each artifact path at bundle time. Forward
          # slashes only: Tauri runs signCommand as a raw process, not a shell.
          $cmd = "trusted-signing-cli -e $env:AZURE_ENDPOINT -a $env:AZURE_CODE_SIGNING_ACCOUNT_NAME -c $env:AZURE_CERT_PROFILE_NAME -d Slideflow %1"
          $conf = @{ bundle = @{ windows = @{ signCommand = $cmd } } } | ConvertTo-Json -Depth 6
          # Written into projectPath (apps/desktop); --config resolves from there.
          Set-Content -Path "apps/desktop/sign.windows.conf.json" -Value $conf
          "config=--config sign.windows.conf.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build the app and (on tag) publish a draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Triple the bundled `slideflow` CLI sidecar is built for; read by
          # apps/desktop/scripts/embed-cli.mjs (run via beforeBuildCommand).
          # Empty on Linux/Windows → host triple.
          SLIDEFLOW_CLI_TARGET: ${{ matrix.cli_target }}
          # Updater package signing (minisign, all platforms). Required now
          # that tauri.conf.json sets createUpdaterArtifacts — builds FAIL
          # without it. Unrelated to Apple code signing below.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID signing + notarization. tauri-action imports the
          # cert from APPLE_CERTIFICATE/APPLE_CERTIFICATE_PASSWORD into a temp
          # keychain automatically; notarization uses APPLE_ID + APPLE_PASSWORD
          # (app-specific password) + APPLE_TEAM_ID. Read only by the macOS
          # bundler — inert on Linux/Windows. Empty (secrets unset) => unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          # Only set a tag/release name for tag pushes. On workflow_dispatch
          # these are empty, so tauri-action builds without creating a release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Slideflow {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          # latest.json's plain windows-x86_64 key should point at the NSIS
          # installer (smoother update UX than msi); per-installer keys are
          # still emitted, so MSI installs keep updating via msi.
          updaterJsonPreferNsis: true
          # steps.winsign.outputs.config is empty on every job except a Windows
          # build with the Azure secrets set, where it adds the signing overlay.
          args: ${{ matrix.args }} ${{ steps.winsign.outputs.config }}
