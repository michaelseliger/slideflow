disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - explicit_type_interface

excluded:
  - DerivedData
  - .build
  - SlideflowTests

# Per constitution: no force-unwraps
force_unwrapping: error

# Line length
line_length:
  warning: 120
  error: 150

# File length
file_length:
  warning: 500
  error: 1000

# Function length
function_body_length:
  warning: 50
  error: 100
